<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    overflow-y:auto;
    overflow-x:hidden;
    position:relative;

    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    background:#05010f;
}

/* ===== الخلفية ===== */
.bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
}

.star{
    position:absolute;
    width:180px;
    height:2px;
    background:linear-gradient(to right,#ffffff,#8c7bff,transparent);
    border-radius:999px;
    filter:drop-shadow(0 0 10px #8c7bff);
    opacity:0;
    transform:rotate(-35deg);
    animation:meteor 3s linear infinite;
}

@keyframes meteor{
    0%{
        transform:translate(0,0) rotate(-35deg);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:translate(600px,600px) rotate(-35deg);
        opacity:0;
    }
}

.s1{
    top:-10%;
    left:5%;
    animation-delay:0s;
}

.s2{
    top:-5%;
    left:25%;
    animation-delay:1s;
}

.s3{
    top:-15%;
    left:50%;
    animation-delay:2s;
}

.s4{
    top:-8%;
    left:70%;
    animation-delay:1.5s;
}

.s5{
    top:-12%;
    left:85%;
    animation-delay:2.5s;
}

/* العنوان */
.header{
    margin-top:25px;
    font-size:30px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    position:relative;
    z-index:2;
}

/* التايمر */
.timer-container{
    margin-top:30px;
    display:flex;
    gap:12px;
    position:relative;
    z-index:2;
}

.time-box{
    width:90px;
    height:90px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:15px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    backdrop-filter: blur(8px);
}

.time-box span{
    font-size:24px;
    font-weight:bold;
}

/* المتسابقين */
.contestants{
    margin-top:40px;
    width:90%;
    display:flex;
    flex-direction:column;
    gap:15px;
    position:relative;
    z-index:2;
}

.box{
    padding:18px;
    border-radius:12px;
    text-align:center;
    font-size:18px;
    background:rgba(255,255,255,0.08);
}

.people-box{
    margin-top:30px;
    width:90%;
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);

.people-box h3{

}

.verify-img{

    height:26px;
    object-fit:contain;

.names{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.names div{
    padding:10px;
    border-radius:10px;
    background:rgba(0,0,0,0.3);
    font-weight:bold;
}

.first{border:2px solid rgb(255, 0, 0);}
.second{border:2px solid rgb(255, 0, 0);}
.third{border:2px solid #ff0000;}

.row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px;
    margin-top:10px;
    border-radius:12px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);

.left-box{
    min-width:55px;

    align-items:center;
    justify-content:center;

    text-align:center;
}

.name{

}

.right-box{

.glow{
    background:red;
    box-shadow:0 0 15px red;
    animation:blink 1.2s infinite;
}

.delay1{ animation-delay:0s; }
.delay2{ animation-delay:1.2s; }
.delay3{ animation-delay:2.4s; }

@keyframes blink{
    0%{opacity:1; transform:scale(1);}
    50%{opacity:0.4; transform:scale(1.05);}
    100%{opacity:1; transform:scale(1);}
}

.channel-info{

    color:red;
    opacity:0.9;

    z-index:2;

.whatsapp-btn{

    box-shadow:0 0 10px red;
    animation:btnBlink 1.2s infinite;
    transition:0.2s;
}

.whatsapp-btn:active{
    transform:scale(0.97);
}

/* أنيميشن النور */
@keyframes btnBlink{
    0%{
        box-shadow:0 0 5px red;
        opacity:1;
    }
    50%{
        box-shadow:0 0 20px red;
        opacity:0.6;
    }
    100%{
        box-shadow:0 0 5px red;
        opacity:1;
    }

    body{

.mini-verify{

/* شاشة البداية */
#splash{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:#05010f;

    display:flex;
    align-items:center;
    justify-content:center;

    z-index:999999;

    transition:1.5s ease;
}

/* اختفاء الشاشة */
#splash.hide{
    opacity:0;
    visibility:hidden;
}

/* التجميع */
.smoke-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* كلمة LORX ASTOR */
.smoke-text{
    position:relative;

    color:white;

    font-size:42px;
    font-weight:bold;

    letter-spacing:5px;

    margin-bottom:60px;

    opacity:0;

    animation:
    textShow 2.5s ease forwards;

    filter:drop-shadow(0 0 15px red);
}

/* الدخان */
.smoke-text::before{

    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:
    linear-gradient(
    90deg,
    red,
    #ff0000,
    #ff4444,
    #ff0000
    );

    filter:blur(25px);

    opacity:0.8;

    z-index:-1;

    animation:smokeMove 3s linear infinite;
}

/* حركة الدخان */
@keyframes smokeMove{

    0%{
        transform:translateX(-25px);
    }

    50%{
        transform:translateX(25px);
    }

    100%{
        transform:translateX(-25px);
    }

}

/* ظهور الكلمة */
@keyframes textShow{

    0%{
        opacity:0;
        transform:scale(0.8);
        filter:blur(12px);
    }

    100%{
        opacity:1;
        transform:scale(1);
        filter:blur(0);
    }

}

/* معرض الصور */
.gallery{
    position:relative;

    width:130px;
    height:200px;

    transform-style:preserve-3d;

    animation:rotate 12s linear infinite;
}

/* الصور */
.gallery span{
    position:absolute;

    width:100%;
    height:100%;

    transform:
    rotateY(calc(var(--i) * 72deg))
    translateZ(230px);
}

/* الصور */
.gallery span img{
    width:100%;
    height:100%;

    object-fit:cover;

    border-radius:15px;

    border:2px solid rgba(255,255,255,0.2);

    box-shadow:0 0 20px rgba(255,0,0,0.4);
}

/* دوران */
@keyframes rotate{

    0%{
        transform:
        perspective(1000px)
        rotateY(0deg);
    }

    100%{
        transform:
        perspective(1000px)
        rotateY(360deg);
    }

}
</style>

<script>
const duration = 16 * 60 * 60 * 1000;

// وقت بداية ثابت لكل الناس (غيره مرة واحدة فقط وقت ما تبدأ)
const start = new Date("2026-05-20T12:00:00").getTime();

const endTime = Number(start) + duration;

function update(){
    let now = Date.now();
    let diff = Math.floor((endTime - now) / 1000);

    if(diff < 0) diff = 0;

    let h = Math.floor(diff / 3600);
    let m = Math.floor((diff % 3600) / 60);
    let s = diff % 60;

    document.getElementById("h").innerText = h;
    document.getElementById("m").innerText = m.toString().padStart(2,'0');
    document.getElementById("s").innerText = s.toString().padStart(2,'0');
}

setInterval(update, 1000);
update();

(function(){
    const url = new URL(window.location.href);
    url.searchParams.set("v", Date.now());
    window.history.replaceState({}, "", url);
})();
</script>
