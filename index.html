<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<!-- يمنع الكاش قدر الإمكان -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Lorx Astor</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    /* التعديل الوحيد هنا */
    overflow-y:auto;
    overflow-x:hidden;

    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    background:#05010f;
}

/* ===== الخلفية ===== */
.bg{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.fighter{
    position:absolute;
    width:40px;
    height:90px;
    background:linear-gradient(to bottom, transparent, black);
    opacity:0.35;
    border-radius:10px;
    animation:fightMove 8s infinite linear;
}

/* رأس */
.fighter::before{
    content:"";
    position:absolute;
    width:18px;
    height:18px;
    background:black;
    border-radius:50%;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
}

/* سيف */
.fighter::after{
    content:"";
    position:absolute;
    width:3px;
    height:40px;
    background:silver;
    right:-5px;
    top:20px;
    transform:rotate(20deg);
    opacity:0.6;
}

@keyframes fightMove{
    0%{transform:translateY(120vh) translateX(0);}
    50%{transform:translateY(40vh) translateX(40px);}
    100%{transform:translateY(-120vh) translateX(-30px);}
}

.f1{left:10%;}
.f2{left:30%; animation-delay:1s;}
.f3{left:50%; animation-delay:2s;}
.f4{left:70%; animation-delay:3s;}
.f5{left:85%; animation-delay:4s;}

/* العنوان */
.header{
    margin-top:25px;
    font-size:30px;
    font-weight:bold;
}

/* التايمر */
.timer-container{
    margin-top:30px;
    display:flex;
    gap:12px;
}

.time-box{
    width:90px;
    height:90px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:15px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    backdrop-filter: blur(8px);
}

.time-box span{
    font-size:24px;
    font-weight:bold;
}

/* المتسابقين */
.contestants{
    margin-top:40px;
    width:90%;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.box{
    padding:18px;
    border-radius:12px;
    text-align:center;
    font-size:18px;
    background:rgba(255,255,255,0.08);
}

.people-box{
    margin-top:30px;
    width:90%;
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    text-align:center;
}

.people-box h3{
    margin-bottom:15px;
    font-size:18px;
}

.header{
    margin-top:25px;
    font-size:30px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}

.verify-img{
    width:26px;
    height:26px;
    object-fit:contain;
}

.names{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.names div{
    padding:10px;
    border-radius:10px;
    background:rgba(0,0,0,0.3);
    font-weight:bold;
}

.first{border:2px solid rgb(255, 0, 0);}
.second{border:2px solid rgb(255, 0, 0);}
.third{border:2px solid #ff0000;}
</style>
</head>

<body>

<div class="bg">
    <div class="fighter f1"></div>
    <div class="fighter f2"></div>
    <div class="fighter f3"></div>
    <div class="fighter f4"></div>
    <div class="fighter f5"></div>
</div>

<div class="header">
    Lorx Astor
    <img src="verify.jpeg" class="verify-img">
</div>

<div class="timer-container">
    <div class="time-box">
        <span id="h">0</span>
        <label>Hours</label>
    </div>

    <div class="time-box">
        <span id="m">00</span>
        <label>Minutes</label>
    </div>

    <div class="time-box">
        <span id="s">00</span>
        <label>Seconds</label>
    </div>
</div>

<div class="contestants">
    <div class="box first">🥇 المركز الأول</div>
    <div class="box second">🥈 المركز الثاني</div>
    <div class="box third">🥉 المركز الثالث</div>
</div>

<div class="people-box">
    <h3>الأشخاص المشاركين</h3>
    <div class="names">
        <div>乂ATRツ๛</div>
        <div>Alshenawy</div>
        <div>BOB</div>
        <div>Essam Alkrwan</div>
        <div>bablu</div>
        <div>𝓐𝔂𝓪𝓷𝓸𝓴𝓸𝓳𝓲</div>
        <div>Mezo Alex ^</div>
        <div>Salma</div>
    </div>
</div>

<script>
const duration = 32 * 60 * 60 * 1000;

// وقت بداية ثابت لكل الناس (غيره مرة واحدة فقط وقت ما تبدأ)
const start = new Date("2026-05-20T12:00:00").getTime();

const endTime = Number(start) + duration;

function update(){
    let now = Date.now();
    let diff = Math.floor((endTime - now) / 1000);

    if(diff < 0) diff = 0;

    let h = Math.floor(diff / 3600);
    let m = Math.floor((diff % 3600) / 60);
    let s = diff % 60;

    document.getElementById("h").innerText = h;
    document.getElementById("m").innerText = m.toString().padStart(2,'0');
    document.getElementById("s").innerText = s.toString().padStart(2,'0');
}

setInterval(update, 1000);
update();

(function(){
    const url = new URL(window.location.href);
    url.searchParams.set("v", Date.now());
    window.history.replaceState({}, "", url);
})();
</script>

</body>
</html>
