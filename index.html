<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Lorx Astor</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    min-height: 100vh; /* تعديل لجعل الصفحة مرنة وتقبل النزول لتحت */
    overflow-y:auto;
    overflow-x:hidden;
    position:relative;

    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    background:#05010f;
    padding-bottom: 180px; /* الفراغ الكبير والمضمون أسفل الصفحة */
}

/* العنوان */
.header{
    margin-top:25px;
    font-size:30px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    position:relative;
    z-index:2;
}

/* التايمر */
.timer-container{
    margin-top:30px;
    display:flex;
    gap:12px;
    position:relative;
    z-index:2;
}

.time-box{
    width:90px;
    height:90px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:15px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    backdrop-filter: blur(8px);
}

.time-box span{
    font-size:24px;
    font-weight:bold;
}

/* المتسابقين */
.contestants{
    margin-top:40px;
    width:90%;
    display:flex;
    flex-direction:column;
    gap:15px;
    position:relative;
    z-index:2;
}

.box{
    padding:18px;
    border-radius:12px;
    text-align:center;
    font-size:18px;
    background:rgba(255,255,255,0.08);
}

.people-box{
    margin-top:30px;
    width:90%;
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    text-align:center;
    position:relative;
    z-index:2;
}

.people-box h3{
    margin-bottom:15px;
    font-size:18px;
}

.verify-img{
    width:26px;
    height:26px;
    object-fit:contain;
}

.names{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.names div{
    padding:10px;
    border-radius:10px;
    background:rgba(0,0,0,0.3);
    font-weight:bold;
}

.first{border:2px solid rgb(255, 0, 0);}
.second{border:2px solid rgb(255, 0, 0);}
.third{border:2px solid #ff0000;}

.row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px;
    margin-top:10px;
    border-radius:12px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);
}

.left-box{
    min-width:55px;
    min-height:40px;
    padding:6px 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.4);
    border-radius:10px;
    font-weight:bold;
    text-align:center;
}

.name{
    flex:1;
    text-align:center;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
}

.right-box{
    min-width:55px;
    min-height:40px;
    padding:6px 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    background:rgba(0,0,0,0.4);
    font-size:12px;
    font-weight:bold;
    text-align:center;
    word-break:break-word;
}

.glow{
    background:red;
    box-shadow:0 0 15px red;
    animation:blink 1.2s infinite;
}

.delay1{ animation-delay:0s; }
.delay2{ animation-delay:1.2s; }
.delay3{ animation-delay:2.4s; }

@keyframes blink{
    0%{opacity:1; transform:scale(1);}
    50%{opacity:0.4; transform:scale(1.05);}
    100%{opacity:1; transform:scale(1);}
}

.channel-info{
    margin-top:5px;
    font-size:12px;
    color:red;
    opacity:0.9;
    font-weight:500;
    z-index:2;
}

.whatsapp-btn{
    display:block;
    margin-top:20px;
    padding:12px;
    text-align:center;
    background:rgb(255, 0, 0);
    color:white;
    font-weight:bold;
    border-radius:12px;
    text-decoration:none;
    border:1px solid red;
    box-shadow:0 0 10px red;
    animation:btnBlink 1.2s infinite;
    transition:0.2s;
}

.whatsapp-btn:active{
    transform:scale(0.97);
}

@keyframes btnBlink{
    0%{ box-shadow:0 0 5px red; opacity:1; }
    50%{ box-shadow:0 0 20px red; opacity:0.6; }
    100%{ box-shadow:0 0 5px red; opacity:1; }
}

.mini-verify{
    width:20px;
    height:20px;
    object-fit:contain;
}
</style>
</head>

<body>

<div class="header">
    Lorx Astor
    <img src="verify.png" class="verify-img">
</div>

<div class="channel-info">
    Channel · 265 followers
</div>

<div class="timer-container">
    <div class="time-box">
        <span id="h">24</span>  <label>Hours</label>
    </div>
    <div class="time-box">
        <span id="m">00</span>  <label>Minutes</label>
    </div>
    <div class="time-box">
        <span id="s">00</span>  <label>Seconds</label>
    </div>
</div>

<div class="contestants">

    <div class="row first">
        <div class="left-box glow delay1">0</div>
        
        <div class="right-box glow delay1">🥇 المركز الاول</div>
    </div>

    <div class="row second">
        <div class="left-box glow delay2">0</div>
        
        <div class="right-box glow delay2">🥈 المركز الثاني</div>
    </div>

    <div class="row third">
        <div class="left-box glow delay3">0</div>
        
        <div class="right-box glow delay3">🥉 المركز الثالث</div>
    </div>

</div>

<div class="people-box">
    <h3>الأشخاص المشاركين</h3>
    <div class="names">
        
    </div>
</div>

<a class="whatsapp-btn" href="https://wa.me/201555615327" target="_blank">تواصل واتساب</a>

</body>
</html>
